# =============================================================================
# generate_caption.py — Centralized Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------
paths:
  dataset: "C:/Users/Digi Max/Desktop/AmirHossein/University/Shiraz University/Research/Projects/1. Content-Based Image Retrieval (CBIR)/Dataset/GHIM-10K"
  prompt_file: "prompt.md"
  output_dir: "output/captions/" # output file is saved here as <dataset_name>_captions.json

# -----------------------------------------------------------------------------
# Models to evaluate (one caption entry per model per image)
# -----------------------------------------------------------------------------
models:
  - "meta-llama/llama-4-scout-17b-16e-instruct"

# -----------------------------------------------------------------------------
# API Keys
# SECURITY: move these to a .env file or environment variables in production.
# Load via: export GROQ_API_KEYS="key1,key2,..."
# -----------------------------------------------------------------------------
api_keys:
  - "gsk_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
  - "gsk_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

# -----------------------------------------------------------------------------
# Rate limiting & retry behaviour
# -----------------------------------------------------------------------------
rate_limiting:
  key_cooldown_seconds: 60 # how long a key is benched after a 429
  acquire_timeout_seconds: 5.0 # how long a worker waits for a free key
  all_cooling_sleep_seconds: 2.0 # sleep when every key is in cooldown
  post_success_sleep_seconds: 0.2 # brief pause after a successful write

# -----------------------------------------------------------------------------
# Inference parameters
# -----------------------------------------------------------------------------
inference:
  temperature: 0.1
  max_tokens: 150 # prompt caps output at ~50 tags ≈ 60-80 tokens

# -----------------------------------------------------------------------------
# Image ingestion
# -----------------------------------------------------------------------------
images:
  valid_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".webp"
